<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Almoxarifado Inteligente
    </title>

    <!-- GOOGLE FONTS -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ICONS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="assets/style.css"
    >

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <header>

            <div class="logo">

                <i class="fa-solid fa-boxes-stacked"></i>

            </div>

            <h1>
                Almoxarifado Inteligente
            </h1>

            <p>
                Consulte materiais rapidamente
                em todos os almoxarifados.
            </p>

        </header>

        <!-- FILTROS -->

        <div class="card">

            <label for="almoxarifado">

                Almoxarifado

            </label>

            <select id="almoxarifado">

                <option value="CENTRAL">
                    CENTRAL
                </option>

                <option value="SUB">
                    SUB
                </option>

                <option value="BENFICA">
                    BENFICA
                </option>

            </select>

        </div>

        <!-- BUSCA -->

        <div class="card">

            <label for="busca">

                Buscar material

            </label>

            <div class="input-wrapper">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="busca"
                    placeholder="Digite código ou descrição..."
                    autocomplete="off"
                >

            </div>

        </div>

        <!-- LOADING -->

        <div
            id="loading"
            class="loading hidden"
        >

            <div class="spinner"></div>

            <span>
                Carregando materiais...
            </span>

        </div>

        <!-- RESULTADOS -->

        <div id="resultados"></div>

    </div>

    <!-- FUSE -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <!-- APP -->
    <script src="assets/app.js"></script>

</body>

</html>
