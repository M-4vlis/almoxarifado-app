<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Almoxarifado Inteligente
    </title>

    <!-- GOOGLE FONTS -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ICONS -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="assets/style.css"
    >

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <header>

            <div class="logo">

                <i class="fa-solid fa-boxes-stacked"></i>

            </div>

            <h1>
                Almoxarifado Inteligente
            </h1>

            <p>
                Consulte materiais rapidamente
                em todos os almoxarifados.
            </p>

        </header>

        <!-- FILTROS -->

        <div class="card">

            <label for="almoxarifado">

                Almoxarifado

            </label>

            <select id="almoxarifado">

                <option value="CENTRAL">
                    CENTRAL
                </option>

                <option value="SUB">
                    SUB
                </option>

                <option value="BENFICA">
                    BENFICA
                </option>

            </select>

        </div>

        <!-- BUSCA -->

        <div class="card">

            <label for="busca">

                Buscar material

            </label>

            <div class="input-wrapper">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="busca"
                    placeholder="Digite código ou descrição..."
                    autocomplete="off"
                >

            </div>

        </div>

        <!-- LOADING -->

        <div
            id="loading"
            class="loading hidden"
        >

            <div class="spinner"></div>

            <span>
                Carregando materiais...
            </span>

        </div>

        <!-- RESULTADOS -->

        <div id="resultados"></div>

    </div>

    <!-- MODAL -->

    <div
        id="modal"
        class="modal hidden"
    >

        <div class="modal-content">

            <button
                id="fecharModal"
                class="fechar-modal"
            >

                <i class="fa-solid fa-xmark"></i>

            </button>

            <!-- IMAGEM -->

            <div class="modal-imagem">

                <img
                    id="modalImagem"
                    src="assets/imagens/placeholder.png"
                    alt="Material"
                >

            </div>

            <!-- INFORMAÇÕES -->

            <div class="modal-info">

                <div
                    id="modalCodigo"
                    class="modal-codigo"
                ></div>

                <div
                    id="modalDescricao"
                    class="modal-descricao"
                ></div>

                <div
                    id="modalStatus"
                    class="modal-status"
                ></div>

            </div>

            <!-- BOTÃO -->

            <button
                id="btnAdicionarLista"
                class="btn-adicionar"
            >

                <i class="fa-solid fa-cart-plus"></i>

                Adicionar à Lista

            </button>

        </div>

    </div>

    <!-- BOTÃO CARRINHO -->

    <button class="fab-carrinho hidden" id="btnCarrinho">
    
        <i class="fa-solid fa-cart-shopping"></i>
    
        <span class="texto-carrinho">
            Minha Lista
        </span>
    
        <span class="contador-carrinho" id="contadorCarrinho">
            0
        </span>
    
    </button>

    <!-- DRAWER -->

    <div
        id="drawerCarrinho"
        class="drawer hidden"
    >

        <div class="drawer-content">

            <!-- HEADER -->

            <div class="drawer-header">

                <h2>
                    Lista de Solicitação
                </h2>

                <button
                    id="fecharDrawer"
                    class="fechar-drawer"
                >

                    <i class="fa-solid fa-xmark"></i>

                </button>

            </div>

            <!-- LISTA -->

            <div id="listaCarrinho"></div>

            <!-- FORMULÁRIO -->

            <div class="formulario">

                <h3>
                    Informações da Solicitação
                </h3>

                <!-- GLPI -->

                <div class="form-group">

                    <label for="glpi">

                        Número GLPI

                    </label>

                    <input
                        type="number"
                        id="glpi"
                        placeholder="Ex: 2025018961"
                    >

                </div>

                <!-- NOME -->

                <div class="form-group">

                    <label for="nomeRetirada">

                        Nome de quem irá retirar

                    </label>

                    <input
                        type="text"
                        id="nomeRetirada"
                        placeholder="Ex: Mario Pereira"
                    >

                </div>

                <!-- MATRÍCULA -->

                <div class="form-group">

                    <label for="matricula">

                        Matrícula

                    </label>

                    <input
                        type="number"
                        id="matricula"
                        placeholder="Ex: 5376"
                    >

                </div>

                <!-- LOCAL -->

                <div class="form-group">

                    <label for="localUso">

                        Local de utilização

                    </label>

                    <input
                        type="text"
                        id="localUso"
                        placeholder="Ex: Santo Cristo"
                    >

                </div>

                <!-- BOTÃO -->

                <button class="btn-whatsapp" id="btnEnviarWhatsapp">

                    <i class="fa-brands fa-whatsapp"></i>

                    <span>
                        Enviar Solicitação
                    </span>

                </button>

            </div>

        </div>

    </div>

    <!-- FUSE -->

    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

    <!-- APP -->

    <script src="assets/app.js"></script>

</body>

</html>
